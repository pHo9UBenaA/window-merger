name: Auto Tag on Merge

on:
  pull_request:
    types: [closed]
    branches:
      - main

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tag:
    name: Auto Tag on Merge
    permissions:
      contents: write # needed for creating and pushing tags
    uses: pHo9UBenaA/gh-action-templates/.github/workflows/auto-tag-on-merge.yml@19edb5410545784a60afe55689770f09407c704f # master
